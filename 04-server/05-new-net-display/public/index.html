<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>龟龟老板的小花园设备中心</title>
    <style>
      :root {
        --sky-top: #e6edf9;
        --sky-mid: #eef3fb;
        --sky-bottom: #f8f3ea;
        --card: rgba(255, 255, 255, 0.88);
        --card-strong: rgba(255, 255, 255, 0.97);
        --line: rgba(41, 56, 78, 0.08);
        --text: #1e293b;
        --muted: #6b7280;
        --shadow: 0 24px 70px rgba(63, 77, 106, 0.14);
        --chip: rgba(255, 255, 255, 0.7);
        --accent-1: #ff8a65;
        --accent-2: #5ea6ff;
        --accent-3: #49bf8f;
        --accent-4: #f4ba41;
        --accent-5: #8368ff;
        --danger: #ff6a6a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(255, 255, 255, 0.96), transparent 26%),
          radial-gradient(circle at top right, rgba(181, 207, 255, 0.22), transparent 22%),
          linear-gradient(180deg, var(--sky-top), var(--sky-mid) 45%, var(--sky-bottom));
      }

      button,
      input {
        font: inherit;
      }

      button {
        border: 0;
        cursor: pointer;
      }

      .app-shell {
        width: min(1240px, 100%);
        margin: 0 auto;
        padding: 20px 14px 36px;
      }

      .dashboard {
        position: relative;
        overflow: hidden;
        border-radius: 36px;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.62), rgba(255, 255, 255, 0.88));
        box-shadow: var(--shadow);
        border: 1px solid rgba(255, 255, 255, 0.65);
      }

      .dashboard::before {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        background:
          radial-gradient(circle at 10% 16%, rgba(255, 255, 255, 0.9), transparent 18%),
          radial-gradient(circle at 85% 12%, rgba(197, 222, 255, 0.35), transparent 16%),
          linear-gradient(180deg, rgba(225, 235, 248, 0.28), transparent 28%);
      }

      .dashboard-body {
        position: relative;
        z-index: 1;
        padding: 22px;
      }

      .topbar {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 18px;
      }

      .location-chip {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 10px 16px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.76);
        color: #24364f;
        font-size: 14px;
        font-weight: 700;
        box-shadow: inset 0 0 0 1px rgba(74, 96, 128, 0.08);
      }

      .location-name {
        margin: 14px 0 6px;
        font-size: clamp(30px, 5vw, 48px);
        letter-spacing: 0.02em;
      }

      .location-subtitle {
        margin: 0;
        max-width: 720px;
        color: var(--muted);
        line-height: 1.7;
      }

      .status-pills {
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-end;
        gap: 12px;
      }

      .status-pill {
        min-width: 140px;
        padding: 14px 16px;
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.8);
        box-shadow: inset 0 0 0 1px rgba(65, 87, 118, 0.08);
      }

      .status-pill-label {
        color: var(--muted);
        font-size: 13px;
      }

      .status-pill-value {
        margin-top: 6px;
        font-size: 28px;
        font-weight: 700;
      }

      .room-tabs {
        display: flex;
        gap: 10px;
        overflow-x: auto;
        padding: 18px 0 6px;
        margin: 20px -2px 0;
        scrollbar-width: none;
      }

      .room-tabs::-webkit-scrollbar {
        display: none;
      }

      .room-tab {
        flex: 0 0 auto;
        padding: 12px 18px;
        border-radius: 999px;
        background: transparent;
        color: #8b95a7;
        font-size: 16px;
        font-weight: 700;
        transition: 180ms ease;
      }

      .room-tab.active {
        background: rgba(255, 255, 255, 0.94);
        color: #152033;
        box-shadow: 0 8px 24px rgba(61, 80, 113, 0.12);
      }

      .room-overview {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 14px;
        margin-top: 18px;
      }

      .mini-card {
        padding: 16px 18px;
        border-radius: 24px;
        background: var(--chip);
        box-shadow: inset 0 0 0 1px rgba(67, 89, 124, 0.08);
      }

      .mini-card-label {
        color: var(--muted);
        font-size: 13px;
      }

      .mini-card-value {
        margin-top: 8px;
        font-size: 26px;
        font-weight: 700;
      }

      .section-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-top: 28px;
      }

      .section-title {
        margin: 0;
        font-size: 22px;
      }

      .section-note {
        color: var(--muted);
        font-size: 14px;
      }

      .device-grid {
        display: grid;
        grid-template-columns: repeat(12, minmax(0, 1fr));
        gap: 16px;
        margin-top: 18px;
      }

      .device-card {
        grid-column: span 6;
        position: relative;
        padding: 22px;
        border-radius: 30px;
        background: var(--card-strong);
        box-shadow: 0 18px 38px rgba(77, 94, 124, 0.12);
        transition: transform 180ms ease, box-shadow 180ms ease;
      }

      .device-card:hover {
        transform: translateY(-2px);
        box-shadow: 0 22px 42px rgba(77, 94, 124, 0.16);
      }

      .device-card-header,
      .detail-header-top,
      .detail-topbar {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 14px;
      }

      .device-icon,
      .detail-icon {
        width: 58px;
        height: 58px;
        border-radius: 20px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 28px;
        background: linear-gradient(180deg, rgba(255,255,255,0.96), rgba(255,255,255,0.74));
        box-shadow: inset 0 0 0 1px rgba(48, 65, 92, 0.08);
      }

      .device-status,
      .detail-status {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 12px;
        border-radius: 999px;
        font-size: 13px;
        font-weight: 700;
        background: rgba(255, 255, 255, 0.82);
      }

      .status-dot {
        width: 9px;
        height: 9px;
        border-radius: 50%;
        background: #b8c0ce;
      }

      .is-online .status-dot {
        background: var(--accent-3);
        box-shadow: 0 0 0 6px rgba(73, 191, 143, 0.14);
      }

      .is-offline .status-dot {
        background: #9ca3af;
      }

      .is-alert .status-dot {
        background: var(--danger);
      }

      .device-title,
      .detail-title {
        margin: 16px 0 4px;
        font-size: 30px;
      }

      .device-subtitle,
      .detail-subtitle {
        color: var(--muted);
        font-size: 15px;
      }

      .device-metrics {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
        margin-top: 18px;
      }

      .metric-pill {
        padding: 14px 16px;
        border-radius: 20px;
        background: rgba(240, 244, 250, 0.92);
      }

      .metric-label {
        color: var(--muted);
        font-size: 13px;
      }

      .metric-value {
        margin-top: 8px;
        font-size: 26px;
        font-weight: 700;
      }

      .device-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 18px;
        color: var(--muted);
        font-size: 13px;
      }

      .device-meta span {
        padding: 8px 12px;
        border-radius: 999px;
        background: rgba(242, 246, 252, 0.92);
      }

      .device-open {
        width: 42px;
        height: 42px;
        border-radius: 16px;
        background: rgba(244, 247, 253, 0.98);
        color: #44526b;
        font-size: 20px;
      }

      .accent-flower { background: linear-gradient(180deg, rgba(255, 145, 102, 0.28), rgba(255,255,255,0)); }
      .accent-fish { background: linear-gradient(180deg, rgba(94, 166, 255, 0.25), rgba(255,255,255,0)); }
      .accent-climate { background: linear-gradient(180deg, rgba(131, 104, 255, 0.2), rgba(255,255,255,0)); }
      .accent-light { background: linear-gradient(180deg, rgba(244, 186, 65, 0.22), rgba(255,255,255,0)); }
      .accent-server { background: linear-gradient(180deg, rgba(73, 191, 143, 0.2), rgba(255,255,255,0)); }
      .accent-weather { background: linear-gradient(180deg, rgba(127, 180, 255, 0.2), rgba(255,255,255,0)); }

      .detail-view {
        display: none;
        margin-top: 18px;
      }

      .detail-view.active {
        display: block;
      }

      .back-button {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 10px 14px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.92);
        color: #34435d;
        font-weight: 700;
      }

      .detail-panel {
        margin-top: 18px;
        padding: 24px;
        border-radius: 34px;
        background: var(--card-strong);
        box-shadow: 0 20px 42px rgba(74, 90, 117, 0.12);
      }

      .detail-summary-grid,
      .detail-info-grid,
      .chart-grid,
      .history-panels {
        display: grid;
        grid-template-columns: repeat(12, minmax(0, 1fr));
        gap: 16px;
      }

      .detail-stat,
      .info-card,
      .chart-card,
      .history-panel,
      .empty-card {
        grid-column: span 4;
        padding: 18px;
        border-radius: 24px;
        background: rgba(246, 248, 252, 0.92);
      }

      .detail-stat-value {
        margin-top: 10px;
        font-size: 34px;
        font-weight: 700;
      }

      .detail-stat-label,
      .info-label {
        color: var(--muted);
        font-size: 13px;
      }

      .info-card {
        grid-column: span 6;
      }

      .info-list {
        margin-top: 12px;
      }

      .info-row {
        display: flex;
        justify-content: space-between;
        gap: 18px;
        padding: 10px 0;
        border-bottom: 1px solid rgba(48, 66, 91, 0.08);
      }

      .info-row:last-child {
        border-bottom: 0;
      }

      .chart-card {
        grid-column: span 6;
      }

      .chart-card.wide,
      .history-toolbar,
      .history-empty,
      .empty-card.wide {
        grid-column: span 12;
      }

      .history-toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin: 18px 0 16px;
      }

      .range-btn,
      .ghost-btn {
        padding: 10px 14px;
        border-radius: 999px;
        background: rgba(240, 244, 251, 0.95);
        color: #415067;
        font-weight: 700;
      }

      .range-btn.active {
        background: #24364f;
        color: #fff;
      }

      .date-input {
        padding: 10px 14px;
        border: 1px solid rgba(55, 74, 103, 0.12);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.95);
      }

      canvas {
        width: 100%;
        display: block;
      }

      .chart-wrap {
        position: relative;
        margin-top: 14px;
      }

      .chart-tip {
        position: absolute;
        top: 12px;
        left: 12px;
        max-width: 220px;
        padding: 8px 10px;
        border-radius: 14px;
        background: rgba(27, 39, 59, 0.84);
        color: #fff;
        font-size: 12px;
        line-height: 1.45;
        opacity: 0;
        transform: translateY(4px);
        transition: 120ms ease;
        pointer-events: none;
      }

      .chart-tip.visible {
        opacity: 1;
        transform: translateY(0);
      }

      .history-panel {
        grid-column: span 6;
      }

      .history-panel-head,
      .detail-block-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .history-panel-title,
      .detail-block-title {
        font-weight: 700;
      }

      .history-panel-meta,
      .history-panel-note,
      .detail-helper,
      .empty-copy,
      .chart-legend,
      .footer-note {
        color: var(--muted);
        font-size: 13px;
      }

      .chart-actions {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        margin-top: 16px;
      }

      .footer-note {
        margin-top: 20px;
      }

      .hidden {
        display: none !important;
      }

      @media (max-width: 1080px) {
        .room-overview {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .device-card,
        .history-panel,
        .chart-card,
        .info-card,
        .detail-stat,
        .empty-card {
          grid-column: span 12;
        }
      }

      @media (max-width: 760px) {
        .app-shell {
          padding: 0;
        }

        .dashboard {
          border-radius: 0;
          min-height: 100vh;
        }

        .dashboard-body {
          padding: 18px 16px 30px;
        }

        .topbar,
        .section-head,
        .chart-actions,
        .detail-header-top,
        .detail-topbar {
          flex-direction: column;
          align-items: stretch;
        }

        .status-pills {
          justify-content: flex-start;
        }

        .location-name {
          font-size: 40px;
        }

        .room-overview,
        .device-metrics {
          grid-template-columns: 1fr;
        }

        .device-card {
          grid-column: span 12;
        }
      }
    </style>
  </head>
  <body>
    <div class="app-shell">
      <main class="dashboard">
        <div class="dashboard-body">
          <section id="overviewView">
            <div class="topbar">
              <div>
                <div class="location-chip">位置中心 · 多设备总览</div>
                <h1 class="location-name" id="locationName">龟龟老板庭院站</h1>
                <p class="location-subtitle" id="locationSubtitle">
                  先按位置筛选，再进设备详情页看各自上传的数据。后续要接更多设备时，只要注册新设备和归属位置，首页和详情结构就能继续扩。
                </p>
              </div>
              <div class="status-pills">
                <div class="status-pill">
                  <div class="status-pill-label">当前筛选位置</div>
                  <div class="status-pill-value" id="currentRoomLabel">全屋</div>
                </div>
                <div class="status-pill">
                  <div class="status-pill-label">在线设备</div>
                  <div class="status-pill-value" id="onlineDeviceCount">--</div>
                </div>
              </div>
            </div>

            <nav class="room-tabs" id="roomTabs"></nav>

            <section class="room-overview" id="roomOverview"></section>

            <div class="section-head">
              <div>
                <h2 class="section-title">位置下的设备</h2>
                <div class="section-note" id="deviceGridHint">点击卡片进入设备数据页。</div>
              </div>
              <div class="section-note" id="lastRefreshText">正在读取网关数据...</div>
            </div>

            <section class="device-grid" id="deviceGrid"></section>
          </section>

          <section class="detail-view" id="detailView">
            <button class="back-button" id="backToOverviewBtn">← 返回设备总览</button>
            <div class="detail-panel" id="detailPanel"></div>
          </section>
        </div>
      </main>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
