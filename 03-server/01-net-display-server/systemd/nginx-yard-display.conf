proxy_cache_path /tmp/nginx_weather_cache
    levels=1:2
    keys_zone=weather_zone:1m
    max_size=5m
    inactive=35m
    use_temp_path=off;

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;

    # MQTT WebSocket proxy (Mosquitto port 9001)
    location /mqtt {
        proxy_pass http://127.0.0.1:9001/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 300;
    }

    # Weather API cached by nginx for 25 minutes
    location = /api/weather/forecast {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection close;
        proxy_set_header X-Real-IP $remote_addr;

        proxy_cache weather_zone;
        proxy_cache_key "weather_v1";
        proxy_cache_valid 200 25m;
        proxy_cache_valid any 0;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_background_update on;
        proxy_cache_lock on;
        proxy_cache_lock_timeout 30s;
        proxy_ignore_headers Cache-Control Expires Set-Cookie;
        proxy_hide_header Cache-Control;

        proxy_connect_timeout 15s;
        proxy_read_timeout 35s;
        add_header X-Cache-Status $upstream_cache_status always;
        add_header Access-Control-Allow-Origin * always;
        add_header Cache-Control no-store always;
    }

    # All other requests -> Node.js :3000
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 300;
        proxy_connect_timeout 5s;
    }
}
