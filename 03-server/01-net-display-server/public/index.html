<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>龟龟老板的小花园设备中心</title>
    <style>
      :root {
        --sky-top: #e6edf9;
        --sky-mid: #eef3fb;
        --sky-bottom: #f8f3ea;
        --card: rgba(255, 255, 255, 0.88);
        --card-strong: rgba(255, 255, 255, 0.97);
        --line: rgba(41, 56, 78, 0.08);
        --text: #1e293b;
        --muted: #6b7280;
        --shadow: 0 24px 70px rgba(63, 77, 106, 0.14);
        --chip: rgba(255, 255, 255, 0.7);
        --accent-1: #ff8a65;
        --accent-2: #5ea6ff;
        --accent-3: #49bf8f;
        --accent-4: #f4ba41;
        --accent-5: #8368ff;
        --danger: #ff6a6a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(255, 255, 255, 0.96), transparent 26%),
          radial-gradient(circle at top right, rgba(181, 207, 255, 0.22), transparent 22%),
          linear-gradient(180deg, var(--sky-top), var(--sky-mid) 45%, var(--sky-bottom));
      }

      button,
      input {
        font: inherit;
      }

      button {
        border: 0;
        cursor: pointer;
      }

      .app-shell {
        width: min(1240px, 100%);
        margin: 0 auto;
        padding: 20px 14px 36px;
      }

      .dashboard {
        position: relative;
        overflow: hidden;
        border-radius: 36px;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.62), rgba(255, 255, 255, 0.88));
        box-shadow: var(--shadow);
        border: 1px solid rgba(255, 255, 255, 0.65);
      }

      .dashboard::before {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        background:
          radial-gradient(circle at 10% 16%, rgba(255, 255, 255, 0.9), transparent 18%),
          radial-gradient(circle at 85% 12%, rgba(197, 222, 255, 0.35), transparent 16%),
          linear-gradient(180deg, rgba(225, 235, 248, 0.28), transparent 28%);
      }

      .dashboard-body {
        position: relative;
        z-index: 1;
        padding: 22px;
      }

      .topbar {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 18px;
      }

      .location-chip {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 10px 16px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.76);
        color: #24364f;
        font-size: 14px;
        font-weight: 700;
        box-shadow: inset 0 0 0 1px rgba(74, 96, 128, 0.08);
      }

      .location-name {
        margin: 14px 0 6px;
        font-size: clamp(30px, 5vw, 48px);
        letter-spacing: 0.02em;
      }

      .location-subtitle {
        margin: 0;
        max-width: 720px;
        color: var(--muted);
        line-height: 1.7;
      }

      .status-pills {
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-end;
        gap: 12px;
      }

      .status-pill {
        min-width: 140px;
        padding: 14px 16px;
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.8);
        box-shadow: inset 0 0 0 1px rgba(65, 87, 118, 0.08);
      }

      .status-pill-label {
        color: var(--muted);
        font-size: 13px;
      }

      .status-pill-value {
        margin-top: 6px;
        font-size: 28px;
        font-weight: 700;
      }

      .room-tabs {
        display: flex;
        gap: 10px;
        overflow-x: auto;
        padding: 18px 0 6px;
        margin: 20px -2px 0;
        scrollbar-width: none;
      }

      .room-tabs::-webkit-scrollbar {
        display: none;
      }

      .room-tab {
        flex: 0 0 auto;
        padding: 12px 18px;
        border-radius: 999px;
        background: transparent;
        color: #8b95a7;
        font-size: 16px;
        font-weight: 700;
        transition: 180ms ease;
      }

      .room-tab.active {
        background: rgba(255, 255, 255, 0.94);
        color: #152033;
        box-shadow: 0 8px 24px rgba(61, 80, 113, 0.12);
      }

      .room-overview {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 14px;
        margin-top: 18px;
      }

      .photo-gallery-card {
        grid-column: span 4;
        padding: 18px;
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.72);
        box-shadow: inset 0 0 0 1px rgba(68, 90, 123, 0.08);
      }

      .photo-gallery-head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 14px;
      }

      .photo-upload-toolbar {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      .photo-upload-select-wrap,
      .photo-upload-target {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 10px 12px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.86);
        box-shadow: inset 0 0 0 1px rgba(67, 89, 124, 0.08);
        color: #43556f;
        font-size: 13px;
        font-weight: 700;
      }

      .photo-upload-select {
        border: 0;
        background: transparent;
        color: #24364f;
        font: inherit;
        outline: none;
      }

      .photo-gallery-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
        margin-top: 16px;
      }

      .photo-showcase-card {
        grid-column: span 4;
        display: grid;
        grid-template-columns: minmax(0, 1.3fr) minmax(260px, 0.9fr);
        gap: 16px;
        align-items: stretch;
        padding: 18px;
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.7);
        box-shadow: inset 0 0 0 1px rgba(63, 86, 118, 0.08);
      }

      .photo-showcase-card.is-compact {
        grid-template-columns: 1fr;
        padding: 14px;
        border-radius: 22px;
      }

      .photo-showcase-media {
        min-height: 220px;
        border-radius: 24px;
        background:
          radial-gradient(circle at top right, rgba(190, 215, 255, 0.55), transparent 28%),
          linear-gradient(180deg, rgba(240, 245, 252, 0.96), rgba(232, 238, 247, 0.92));
        box-shadow: inset 0 0 0 1px rgba(72, 94, 128, 0.08);
      }

      .photo-showcase-card.is-compact .photo-showcase-media {
        min-height: 150px;
      }

      .photo-showcase-media.has-photo {
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
      }

      .photo-showcase-media.is-empty {
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .photo-empty-copy {
        max-width: 220px;
        color: #6f7d90;
        font-size: 15px;
        line-height: 1.7;
        text-align: center;
      }

      .photo-showcase-copy {
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        gap: 14px;
      }

      .photo-showcase-eyebrow {
        color: var(--muted);
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .photo-showcase-title {
        margin-top: 10px;
        font-size: 28px;
        font-weight: 800;
        line-height: 1.2;
      }

      .photo-showcase-subtitle {
        margin-top: 8px;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.7;
      }

      .photo-showcase-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .mini-card {
        padding: 16px 18px;
        border-radius: 24px;
        background: var(--chip);
        box-shadow: inset 0 0 0 1px rgba(67, 89, 124, 0.08);
      }

      .mini-card-label {
        color: var(--muted);
        font-size: 13px;
      }

      .mini-card-value {
        margin-top: 8px;
        font-size: 26px;
        font-weight: 700;
      }

      .section-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-top: 28px;
      }

      .section-title {
        margin: 0;
        font-size: 22px;
      }

      .section-note {
        color: var(--muted);
        font-size: 14px;
      }

      .device-grid {
        display: grid;
        grid-template-columns: repeat(12, minmax(0, 1fr));
        gap: 16px;
        margin-top: 18px;
      }

      .device-card {
        grid-column: span 6;
        position: relative;
        padding: 22px;
        border-radius: 30px;
        background: var(--card-strong);
        box-shadow: 0 18px 38px rgba(77, 94, 124, 0.12);
        transition: transform 180ms ease, box-shadow 180ms ease;
      }

      .device-card:hover {
        transform: translateY(-2px);
        box-shadow: 0 22px 42px rgba(77, 94, 124, 0.16);
      }

      .device-card-header,
      .detail-header-top,
      .detail-topbar {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 14px;
      }

      .device-icon,
      .detail-icon {
        width: 58px;
        height: 58px;
        border-radius: 20px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 28px;
        background: linear-gradient(180deg, rgba(255,255,255,0.96), rgba(255,255,255,0.74));
        box-shadow: inset 0 0 0 1px rgba(48, 65, 92, 0.08);
      }

      .device-status,
      .detail-status {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 12px;
        border-radius: 999px;
        font-size: 13px;
        font-weight: 700;
        background: rgba(255, 255, 255, 0.82);
      }

      .status-dot {
        width: 9px;
        height: 9px;
        border-radius: 50%;
        background: #b8c0ce;
      }

      .is-online .status-dot {
        background: var(--accent-3);
        box-shadow: 0 0 0 6px rgba(73, 191, 143, 0.14);
      }

      .is-offline .status-dot {
        background: #9ca3af;
      }

      .is-alert .status-dot {
        background: var(--danger);
      }

      /* 告警徽章 */
      .alert-badge {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 700;
        line-height: 1.6;
        vertical-align: middle;
        margin-left: 6px;
      }

      .alert-badge-warn {
        background: rgba(244, 186, 65, 0.22);
        color: #a06800;
      }

      .alert-badge-alert {
        background: rgba(255, 106, 106, 0.18);
        color: #c0303b;
      }

      /* 异常指标数值颜色编码 */
      .metric-value-warn {
        color: #a06800;
      }

      .metric-value-alert {
        color: #c0303b;
      }

      .device-title,
      .detail-title {
        margin: 16px 0 4px;
        font-size: 30px;
      }

      .device-subtitle,
      .detail-subtitle {
        color: var(--muted);
        font-size: 15px;
      }

      .device-metrics {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
        margin-top: 18px;
      }

      .metric-pill {
        padding: 14px 16px;
        border-radius: 20px;
        background: rgba(240, 244, 250, 0.92);
      }

      .metric-label {
        color: var(--muted);
        font-size: 13px;
      }

      .metric-value {
        margin-top: 8px;
        font-size: 26px;
        font-weight: 700;
      }

      .device-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 18px;
        color: var(--muted);
        font-size: 13px;
      }

      .device-meta span {
        padding: 8px 12px;
        border-radius: 999px;
        background: rgba(242, 246, 252, 0.92);
      }

      .device-open {
        width: 42px;
        height: 42px;
        border-radius: 16px;
        background: rgba(244, 247, 253, 0.98);
        color: #44526b;
        font-size: 20px;
      }

      .accent-flower { background: linear-gradient(180deg, rgba(255, 145, 102, 0.28), rgba(255,255,255,0)); }
      .accent-fish { background: linear-gradient(180deg, rgba(94, 166, 255, 0.25), rgba(255,255,255,0)); }
      .accent-climate { background: linear-gradient(180deg, rgba(131, 104, 255, 0.2), rgba(255,255,255,0)); }
      .accent-light { background: linear-gradient(180deg, rgba(244, 186, 65, 0.22), rgba(255,255,255,0)); }
      .accent-server { background: linear-gradient(180deg, rgba(73, 191, 143, 0.2), rgba(255,255,255,0)); }
      .accent-weather { background: linear-gradient(180deg, rgba(127, 180, 255, 0.2), rgba(255,255,255,0)); }

      .detail-view {
        display: none;
        margin-top: 18px;
      }

      .detail-view.active {
        display: block;
      }

      .back-button {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 10px 14px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.92);
        color: #34435d;
        font-weight: 700;
      }

      .detail-panel {
        margin-top: 18px;
        padding: 24px;
        border-radius: 34px;
        background: var(--card-strong);
        box-shadow: 0 20px 42px rgba(74, 90, 117, 0.12);
      }

      .detail-summary-grid,
      .detail-info-grid,
      .chart-grid,
      .history-panels {
        display: grid;
        grid-template-columns: repeat(12, minmax(0, 1fr));
        gap: 16px;
      }

      .history-panels {
        gap: 18px;
      }

      .detail-stat,
      .info-card,
      .chart-card,
      .history-panel,
      .empty-card {
        grid-column: span 4;
        padding: 18px;
        border-radius: 24px;
        background: rgba(246, 248, 252, 0.92);
      }

      .detail-stat-value {
        margin-top: 10px;
        font-size: 34px;
        font-weight: 700;
      }

      .detail-stat-label,
      .info-label {
        color: var(--muted);
        font-size: 13px;
      }

      .info-card {
        grid-column: span 6;
      }

      .device-scene-card {
        grid-column: span 12;
        position: relative;
        overflow: hidden;
        min-height: 154px;
        display: flex;
        align-items: stretch;
        justify-content: space-between;
        gap: 18px;
        background: linear-gradient(180deg, rgba(250, 252, 255, 0.98), rgba(241, 246, 252, 0.94));
      }

      .scene-copy {
        position: relative;
        z-index: 2;
        max-width: 260px;
      }

      .scene-eyebrow {
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .scene-title {
        margin-top: 10px;
        font-size: 24px;
        font-weight: 800;
        line-height: 1.2;
      }

      .scene-subtitle {
        margin-top: 8px;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.65;
      }

      .scene-badges {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 14px;
      }

      .scene-badges span {
        padding: 7px 10px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.72);
        box-shadow: inset 0 0 0 1px rgba(64, 84, 112, 0.08);
        color: #3d4e67;
        font-size: 12px;
        font-weight: 700;
      }

      .scene-presence {
        margin-top: 16px;
        padding: 12px 14px;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.68);
        box-shadow: inset 0 0 0 1px rgba(67, 87, 116, 0.08);
      }

      .scene-presence-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .scene-presence-title,
      .scene-presence-count {
        font-size: 12px;
        font-weight: 700;
        color: #43556f;
      }

      .scene-device-list {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 10px;
      }

      .scene-device-chip {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        padding: 7px 10px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 700;
        background: rgba(245, 248, 252, 0.9);
        color: #43556f;
      }

      .scene-device-chip .scene-device-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #a7b2c2;
      }

      .scene-device-chip.is-online .scene-device-dot {
        background: #49bf8f;
        box-shadow: 0 0 0 5px rgba(73, 191, 143, 0.12);
      }

      .scene-device-chip.is-offline {
        color: #6d7887;
      }

      .scene-presence-empty {
        margin-top: 8px;
        color: var(--muted);
        font-size: 13px;
      }

      .sensor-reminder-card {
        padding: 16px 18px;
        border-radius: 22px;
        background:
          radial-gradient(circle at top right, rgba(255, 222, 167, 0.32), transparent 26%),
          linear-gradient(180deg, rgba(255, 250, 241, 0.96), rgba(248, 243, 232, 0.94));
        box-shadow: inset 0 0 0 1px rgba(121, 96, 59, 0.08);
      }

      .sensor-reminder-eyebrow {
        color: #8d6b32;
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .sensor-reminder-body {
        margin-top: 10px;
        color: #4a4f5a;
        font-size: 15px;
        line-height: 1.75;
      }

      .device-page-group + .device-page-group {
        margin-top: 8px;
      }

      .device-page-group-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-top: 14px;
      }

      .device-page-group-title {
        font-size: 14px;
        font-weight: 800;
        color: #24364f;
      }

      .scene-art {
        position: relative;
        flex: 1;
        min-height: 160px;
      }

      .scene-shape {
        position: absolute;
        display: block;
      }

      .scene-yard {
        background:
          radial-gradient(circle at 80% 18%, rgba(255, 205, 120, 0.55), transparent 18%),
          linear-gradient(180deg, rgba(206, 234, 255, 0.72), rgba(236, 248, 231, 0.92) 62%, rgba(247, 236, 220, 0.88));
      }

      .scene-yard .scene-sun {
        top: 18px;
        right: 34px;
        width: 50px;
        height: 50px;
        border-radius: 50%;
        background: radial-gradient(circle at 35% 35%, #fff7d2, #ffbf5e 70%);
        box-shadow: 0 0 34px rgba(255, 191, 94, 0.35);
      }

      .scene-yard .scene-plant {
        right: 92px;
        bottom: 34px;
        width: 88px;
        height: 88px;
        background: radial-gradient(circle at 50% 75%, rgba(48, 130, 78, 0.18), transparent 46%);
      }

      .scene-yard .scene-plant::before,
      .scene-yard .scene-plant::after {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: 50% 50% 0 50%;
        background: linear-gradient(180deg, #77d188, #3f9b59);
      }

      .scene-yard .scene-plant::before {
        width: 26px;
        height: 44px;
        left: 12px;
        top: 24px;
        transform: rotate(-28deg);
      }

      .scene-yard .scene-plant::after {
        width: 28px;
        height: 50px;
        right: 16px;
        top: 18px;
        transform: rotate(24deg);
      }

      .scene-yard .scene-pot {
        right: 102px;
        bottom: 12px;
        width: 68px;
        height: 38px;
        border-radius: 12px 12px 20px 20px;
        background: linear-gradient(180deg, #d58961, #b86a43);
      }

      .scene-yard .scene-fence {
        left: 18px;
        right: 18px;
        bottom: 10px;
        height: 28px;
        background:
          repeating-linear-gradient(90deg, rgba(183, 137, 98, 0.94) 0 12px, transparent 12px 18px),
          linear-gradient(180deg, transparent 0 16px, rgba(164, 119, 83, 0.94) 16px 20px, transparent 20px);
        opacity: 0.68;
      }

      .scene-yard .scene-rose {
        left: 74px;
        bottom: 52px;
        width: 38px;
        height: 72px;
      }

      .scene-yard .scene-rose::before {
        content: "";
        position: absolute;
        left: 15px;
        bottom: 0;
        width: 5px;
        height: 42px;
        border-radius: 6px;
        background: linear-gradient(180deg, #67bb74, #3f8f57);
      }

      .scene-yard .scene-rose::after {
        content: "";
        position: absolute;
        left: 6px;
        top: 2px;
        width: 26px;
        height: 26px;
        border-radius: 50%;
        background:
          radial-gradient(circle at center, #ffd3df 0 18%, transparent 18%),
          radial-gradient(circle at 50% 20%, #e16a89 0 34%, transparent 35%),
          radial-gradient(circle at 18% 50%, #cf4d74 0 31%, transparent 32%),
          radial-gradient(circle at 82% 50%, #cf4d74 0 31%, transparent 32%),
          radial-gradient(circle at 50% 84%, #b83e67 0 30%, transparent 31%);
        box-shadow: 0 12px 0 -8px rgba(78, 145, 91, 0.9);
      }

      .scene-yard .scene-sunflower {
        left: 146px;
        bottom: 46px;
        width: 54px;
        height: 92px;
      }

      .scene-yard .scene-sunflower::before {
        content: "";
        position: absolute;
        left: 24px;
        bottom: 0;
        width: 5px;
        height: 54px;
        border-radius: 6px;
        background: linear-gradient(180deg, #6fbc63, #46894e);
      }

      .scene-yard .scene-sunflower::after {
        content: "";
        position: absolute;
        left: 6px;
        top: 4px;
        width: 42px;
        height: 42px;
        border-radius: 50%;
        background:
          radial-gradient(circle at center, #6e4a2f 0 30%, #8c5f35 31% 40%, transparent 41%),
          conic-gradient(from 0deg, #f8c54f 0 12%, transparent 12% 20%, #f8c54f 20% 32%, transparent 32% 40%, #f8c54f 40% 52%, transparent 52% 60%, #f8c54f 60% 72%, transparent 72% 80%, #f8c54f 80% 92%, transparent 92% 100%);
        box-shadow: -12px 34px 0 -11px #5aa85f, 10px 40px 0 -11px #5aa85f;
      }

      .scene-yard .scene-lotus {
        left: 232px;
        bottom: 34px;
        width: 88px;
        height: 54px;
        border-radius: 50%;
        background:
          radial-gradient(circle at 50% 68%, rgba(101, 171, 110, 0.24), transparent 52%),
          linear-gradient(135deg, #8fd09b, #5faa67);
        clip-path: ellipse(48% 42% at 50% 50%);
      }

      .scene-yard .scene-lotus::before {
        content: "";
        position: absolute;
        left: 18px;
        top: 8px;
        width: 52px;
        height: 30px;
        background:
          radial-gradient(circle at 50% 80%, #ffd5e4 0 16%, transparent 16%),
          radial-gradient(circle at 26% 56%, #f4a8c3 0 22%, transparent 23%),
          radial-gradient(circle at 74% 56%, #f4a8c3 0 22%, transparent 23%),
          radial-gradient(circle at 50% 24%, #f7bcd2 0 22%, transparent 23%);
      }

      .scene-yard .scene-fish {
        left: 320px;
        bottom: 42px;
        width: 46px;
        height: 26px;
        border-radius: 50% 55% 45% 50%;
        background: linear-gradient(180deg, #ffb45a, #f07d36);
        transform: rotate(-10deg);
      }

      .scene-yard .scene-fish::before {
        content: "";
        position: absolute;
        right: -10px;
        top: 6px;
        width: 16px;
        height: 14px;
        background: linear-gradient(180deg, #ffcf8a, #f08a42);
        clip-path: polygon(0 50%, 100% 0, 100% 100%);
      }

      .scene-yard .scene-fish::after {
        content: "";
        position: absolute;
        left: 10px;
        top: 8px;
        width: 4px;
        height: 4px;
        border-radius: 50%;
        background: #fff8f0;
        box-shadow: 0 0 0 1px rgba(93, 54, 27, 0.35);
      }

      .scene-yard .scene-chrysanthemum {
        right: 174px;
        bottom: 54px;
        width: 54px;
        height: 54px;
      }

      .scene-yard .scene-chrysanthemum::before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: 50%;
        background:
          radial-gradient(circle at center, #f6cc58 0 18%, transparent 18%),
          conic-gradient(from 0deg, #fff2b2 0 8%, transparent 8% 16%, #ffe88f 16% 24%, transparent 24% 32%, #fff2b2 32% 40%, transparent 40% 48%, #ffe88f 48% 56%, transparent 56% 64%, #fff2b2 64% 72%, transparent 72% 80%, #ffe88f 80% 88%, transparent 88% 96%, #fff2b2 96% 100%);
      }

      .scene-yard .scene-chrysanthemum::after {
        content: "";
        position: absolute;
        left: 25px;
        bottom: -22px;
        width: 4px;
        height: 24px;
        border-radius: 6px;
        background: linear-gradient(180deg, #6dbd74, #4b9758);
      }

      .scene-study {
        background: linear-gradient(180deg, rgba(227, 236, 255, 0.86), rgba(247, 241, 230, 0.94));
      }

      .scene-study .scene-desk,
      .scene-office .scene-desk {
        left: 26px;
        right: 24px;
        bottom: 18px;
        height: 20px;
        border-radius: 16px;
        background: linear-gradient(180deg, #d1a06f, #a87648);
      }

      .scene-study .scene-books {
        right: 42px;
        bottom: 38px;
        width: 92px;
        height: 72px;
        background:
          linear-gradient(180deg, #79a6ff, #5b89eb) 0 100% / 24px 56px no-repeat,
          linear-gradient(180deg, #ff9f6f, #ec7f54) 30px 100% / 24px 66px no-repeat,
          linear-gradient(180deg, #83c5a1, #55a77c) 60px 100% / 24px 48px no-repeat;
      }

      .scene-study .scene-lamp,
      .scene-bedroom .scene-lamp {
        left: 38px;
        bottom: 42px;
        width: 62px;
        height: 78px;
      }

      .scene-study .scene-lamp::before,
      .scene-bedroom .scene-lamp::before {
        content: "";
        position: absolute;
        top: 0;
        left: 12px;
        width: 38px;
        height: 24px;
        border-radius: 10px 10px 14px 14px;
        background: linear-gradient(180deg, #ffe3a8, #ffc56d);
      }

      .scene-study .scene-lamp::after,
      .scene-bedroom .scene-lamp::after {
        content: "";
        position: absolute;
        left: 28px;
        top: 18px;
        width: 6px;
        height: 52px;
        background: #6f7f95;
        box-shadow: -14px 50px 0 12px #7b8ca3;
      }

      .scene-study .scene-clock {
        top: 24px;
        right: 28px;
        width: 34px;
        height: 34px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.9);
        box-shadow: inset 0 0 0 2px rgba(92, 113, 145, 0.18);
      }

      .scene-office {
        background: linear-gradient(180deg, rgba(224, 240, 248, 0.84), rgba(238, 243, 249, 0.96));
      }

      .scene-office .scene-monitor {
        right: 54px;
        bottom: 46px;
        width: 98px;
        height: 60px;
        border-radius: 14px;
        background: linear-gradient(180deg, #2d405c, #1f3149);
        box-shadow: inset 0 0 0 3px rgba(255, 255, 255, 0.08);
      }

      .scene-office .scene-monitor::after {
        content: "";
        position: absolute;
        left: 38px;
        bottom: -18px;
        width: 22px;
        height: 18px;
        border-radius: 0 0 10px 10px;
        background: #70829a;
      }

      .scene-office .scene-mug {
        left: 48px;
        bottom: 42px;
        width: 34px;
        height: 32px;
        border-radius: 0 0 10px 10px;
        background: linear-gradient(180deg, #ffb1a8, #ec826f);
      }

      .scene-office .scene-mug::after {
        content: "";
        position: absolute;
        right: -10px;
        top: 8px;
        width: 12px;
        height: 12px;
        border-radius: 50%;
        border: 3px solid #ec826f;
      }

      .scene-office .scene-files {
        right: 24px;
        bottom: 34px;
        width: 40px;
        height: 62px;
        border-radius: 10px;
        background:
          linear-gradient(180deg, #8fcfbb, #61b496) 0 100% / 18px 54px no-repeat,
          linear-gradient(180deg, #7ea6ff, #5b86e6) 20px 100% / 18px 62px no-repeat;
      }

      .scene-bedroom {
        background:
          radial-gradient(circle at 80% 18%, rgba(255, 238, 177, 0.2), transparent 16%),
          linear-gradient(180deg, rgba(197, 211, 255, 0.82), rgba(238, 232, 248, 0.94));
      }

      .scene-bedroom .scene-moon {
        top: 22px;
        right: 36px;
        width: 44px;
        height: 44px;
        border-radius: 50%;
        background: #fff0b7;
        box-shadow: -10px 0 0 0 rgba(201, 208, 255, 0.92) inset;
      }

      .scene-bedroom .scene-bed {
        left: 36px;
        right: 28px;
        bottom: 20px;
        height: 54px;
        border-radius: 18px 18px 14px 14px;
        background: linear-gradient(180deg, #8ea5d8, #7088c2);
      }

      .scene-bedroom .scene-pillow {
        left: 54px;
        bottom: 48px;
        width: 48px;
        height: 20px;
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.86);
      }

      .scene-generic {
        background: linear-gradient(180deg, rgba(229, 238, 252, 0.84), rgba(243, 246, 251, 0.96));
      }

      .scene-generic .scene-orb {
        top: 24px;
        right: 34px;
        width: 50px;
        height: 50px;
        border-radius: 50%;
        background: radial-gradient(circle at 35% 35%, #fff, #8cb8ff 70%);
      }

      .scene-generic .scene-card {
        right: 80px;
        bottom: 24px;
        width: 110px;
        height: 72px;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.68);
        box-shadow: inset 0 0 0 1px rgba(76, 97, 128, 0.08);
      }

      .scene-generic .scene-spark {
        left: 42px;
        top: 34px;
        width: 18px;
        height: 18px;
        background: linear-gradient(180deg, #ffcf73, #ff9a57);
        clip-path: polygon(50% 0, 62% 36%, 100% 50%, 62% 64%, 50% 100%, 38% 64%, 0 50%, 38% 36%);
      }

      .scene-generic .scene-line {
        left: 34px;
        right: 34px;
        bottom: 28px;
        height: 2px;
        background: linear-gradient(90deg, transparent, rgba(107, 133, 169, 0.5), transparent);
      }

      .info-list {
        margin-top: 12px;
      }

      .info-row {
        display: flex;
        justify-content: space-between;
        gap: 18px;
        padding: 10px 0;
        border-bottom: 1px solid rgba(48, 66, 91, 0.08);
      }

      .info-row:last-child {
        border-bottom: 0;
      }

      .chart-card {
        grid-column: span 6;
      }

      .chart-card.wide,
      .history-toolbar,
      .history-empty,
      .empty-card.wide {
        grid-column: span 12;
      }

      .history-toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin: 18px 0 16px;
      }

      .range-btn,
      .ghost-btn {
        padding: 10px 14px;
        border-radius: 999px;
        background: rgba(240, 244, 251, 0.95);
        color: #415067;
        font-weight: 700;
      }

      .range-btn.active {
        background: #24364f;
        color: #fff;
      }

      .date-input {
        padding: 10px 14px;
        border: 1px solid rgba(55, 74, 103, 0.12);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.95);
      }

      canvas {
        width: 100%;
        display: block;
      }

      .chart-wrap {
        position: relative;
        margin-top: 14px;
      }

      .history-panel .chart-wrap {
        min-height: 320px;
      }

      .chart-tip {
        position: absolute;
        top: 12px;
        left: 12px;
        max-width: 220px;
        padding: 8px 10px;
        border-radius: 14px;
        background: rgba(27, 39, 59, 0.84);
        color: #fff;
        font-size: 12px;
        line-height: 1.45;
        opacity: 0;
        transform: translateY(4px);
        transition: 120ms ease;
        pointer-events: none;
      }

      .chart-tip.visible {
        opacity: 1;
        transform: translateY(0);
      }

      .history-panel {
        grid-column: span 12;
        padding: 20px 22px;
        border-radius: 28px;
        background: linear-gradient(180deg, rgba(245, 248, 253, 0.96), rgba(241, 245, 251, 0.92));
      }

      .history-panel-head,
      .detail-block-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .history-panel-title,
      .detail-block-title {
        font-weight: 700;
      }

      .history-panel-title {
        font-size: 18px;
      }

      .history-panel-meta,
      .history-panel-note,
      .detail-helper,
      .empty-copy,
      .chart-legend,
      .footer-note {
        color: var(--muted);
        font-size: 13px;
      }

      .chart-actions {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        margin-top: 16px;
      }

      .history-panel-actions {
        display: flex;
        justify-content: flex-end;
        margin-top: 10px;
      }

      .footer-note {
        margin-top: 20px;
      }

      .hidden {
        display: none !important;
      }

      @media (max-width: 1080px) {
        .room-overview {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .device-card,
        .history-panel,
        .chart-card,
        .info-card,
        .detail-stat,
        .empty-card {
          grid-column: span 12;
        }
      }

      @media (max-width: 760px) {
        .app-shell {
          padding: 0;
        }

        .dashboard {
          border-radius: 0;
          min-height: 100vh;
        }

        .dashboard-body {
          padding: 18px 16px 30px;
        }

        .topbar,
        .section-head,
        .chart-actions,
        .detail-header-top,
        .detail-topbar {
          flex-direction: column;
          align-items: stretch;
        }

        .status-pills {
          justify-content: flex-start;
        }

        .location-name {
          font-size: 40px;
        }

        .room-overview,
        .device-metrics {
          grid-template-columns: 1fr;
        }

        .photo-gallery-grid,
        .photo-showcase-card {
          grid-template-columns: 1fr;
        }

        .photo-gallery-head {
          flex-direction: column;
        }

        .device-card {
          grid-column: span 12;
        }
      }
    </style>
  </head>
  <body>
    <div class="app-shell">
      <main class="dashboard">
        <div class="dashboard-body">
          <section id="overviewView">
            <div class="topbar">
              <div>
                <div class="location-chip">位置中心 · 多设备总览</div>
                <h1 class="location-name" id="locationName">龟龟老板庭院站</h1>
                <p class="location-subtitle" id="locationSubtitle"></p>
              </div>
              <div class="status-pills">
                <div class="status-pill">
                  <div class="status-pill-label">当前筛选位置</div>
                  <div class="status-pill-value" id="currentRoomLabel">全屋</div>
                </div>
                <div class="status-pill">
                  <div class="status-pill-label">在线设备</div>
                  <div class="status-pill-value" id="onlineDeviceCount">--</div>
                </div>
              </div>
            </div>

            <nav class="room-tabs" id="roomTabs"></nav>

            <section class="room-overview" id="roomOverview"></section>

            <div class="section-head">
              <div>
                <h2 class="section-title">位置下的设备</h2>
                <div class="section-note" id="deviceGridHint">点击卡片进入设备数据页。</div>
              </div>
              <div class="section-note" id="lastRefreshText">正在读取网关数据...</div>
            </div>

            <section class="device-grid" id="deviceGrid"></section>
          </section>

          <section class="detail-view" id="detailView">
            <button class="back-button" id="backToOverviewBtn">← 返回设备总览</button>
            <div class="detail-panel" id="detailPanel"></div>
          </section>
        </div>
      </main>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
